name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cvx-server
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cvx-server
          - target: x86_64-apple-darwin
            os: macos-14
            artifact: cvx-server
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} -p cvx-server
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist && tar czf cvx-server-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: cvx-server-${{ matrix.target }}
          path: dist/cvx-server-${{ matrix.target }}.tar.gz

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish crates (dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in cvx-core cvx-index cvx-storage cvx-ingest cvx-analytics cvx-query cvx-api cvx-server chronos-vector; do
            echo "Publishing $crate..."
            cargo publish -p $crate --allow-dirty || true
            sleep 30
          done

  publish-pypi:
    name: Publish to PyPI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
            manylinux: auto
          - os: macos-latest
            target: aarch64
            manylinux: "off"
          - os: macos-14
            target: x86_64
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          if [[ "$OSTYPE" == "darwin"* ]]; then
            sed -i '' "s/^version = .*/version = \"$VERSION\"/" crates/cvx-python/Cargo.toml
          else
            sed -i "s/^version = .*/version = \"$VERSION\"/" crates/cvx-python/Cargo.toml
          fi
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.12
          working-directory: crates/cvx-python
          manylinux: ${{ matrix.manylinux }}
          before-script-linux: |
            yum install -y clang-devel libzstd-devel lz4-devel bzip2-devel zlib-devel snappy-devel || \
            apk add --no-cache clang-dev zstd-dev lz4-dev bzip2-dev zlib-dev snappy-dev || true
      - name: Upload to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing crates/cvx-python/dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}

  release:
    name: GitHub Release
    needs: [build, publish-crates, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2
      - name: Generate changelog
        run: git-cliff --latest --strip header -o CHANGELOG.md
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: artifacts/*.tar.gz
          generate_release_notes: false
