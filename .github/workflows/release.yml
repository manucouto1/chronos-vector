name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cvx-server
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cvx-server
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: cvx-server
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }} -p cvx-server
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact }} dist/
          cd dist && tar czf cvx-server-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: cvx-server-${{ matrix.target }}
          path: dist/cvx-server-${{ matrix.target }}.tar.gz

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2
      - name: Generate changelog
        run: git-cliff --latest --strip header -o CHANGELOG.md
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: artifacts/*.tar.gz
          generate_release_notes: false
